# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
        args:
          - --unsafe
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.21
    hooks:
      # Fail the commit if uv.lock is out of sync with pyproject.toml
      # (e.g. after a version bump) - runs regardless of which files changed.
      - id: uv-lock
  - repo: local
    hooks:
      - id: ruff-check
        name: Check code with ruff
        entry: uv run ruff check --force-exclude --fix --exit-non-zero-on-fix
        language: system
        types: [python]

      - id: ruff-format
        name: Format code with ruff
        entry: uv run ruff format --force-exclude --exit-non-zero-on-format
        language: system
        types: [python]

      - id: mypy
        name: Type check with mypy
        entry: uv run mypy src/
        language: system
        types: [python]
        pass_filenames: false

      - id: gen-cli-docs
        name: Sync CLI reference in docs with erdify --help
        # Regenerates the cli-help block; fails (like uv-lock) if it changed,
        # so the refreshed docs get staged. CI runs this via pre-commit too.
        entry: uv run python scripts/gen_cli_docs.py
        language: system
        always_run: true
        pass_filenames: false
