name: Publish to PyPI

on:
  release:
    types: [published]

# Least privilege by default; the publish job adds only what it needs.
permissions:
  contents: read

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    # Gated environment: required reviewers + tag-only deployment (v*).
    environment: pypi
    permissions:
      # OIDC token for PyPI Trusted Publishing - replaces the long-lived API token.
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Set version from release tag
        # The published version is taken from the release tag (e.g. v0.3.0 -> 0.3.0),
        # so pyproject.toml does not need a manual bump before each release.
        run: uv version "${GITHUB_REF_NAME#v}"
      - name: Build distributions
        run: uv build
      - name: Publish to PyPI
        # No token: uv reads the OIDC credentials minted via id-token: write.
        run: uv publish --trusted-publishing always
