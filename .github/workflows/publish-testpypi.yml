name: Publish to TestPyPI

# Manual dry-run: validate the full build + publish path against TestPyPI
# before cutting a real release.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (optional; TestPyPI rejects duplicates, so bump for re-runs, e.g. 0.2.0.dev1)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    # Separate gated environment; needs its own Trusted Publisher on test.pypi.org.
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Override version (optional)
        if: inputs.version != ''
        run: uv version "${{ inputs.version }}"
      - name: Build distributions
        run: uv build
      - name: Publish to TestPyPI
        run: uv publish --trusted-publishing always --publish-url https://test.pypi.org/legacy/
