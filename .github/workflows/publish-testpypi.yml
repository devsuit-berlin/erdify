name: Publish to TestPyPI

# Manual dry-run: validate the full build + publish path against TestPyPI
# before cutting a real release. Requires a Trusted Publisher configured for
# this repository on https://test.pypi.org (project, owner, workflow, environment).
on:
  workflow_dispatch:

jobs:
  testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write # required for TestPyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Build distributions
        run: uv build
      - name: Publish to TestPyPI (Trusted Publishing)
        run: uv publish --publish-url https://test.pypi.org/legacy/ --trusted-publishing always
