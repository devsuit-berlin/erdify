name: Testing

concurrency:
  group: testing-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full Python sweep on Linux (primary platform).
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14", "3.15"]
        # macOS/Windows smoke-test min+max supported Python to catch
        # path/encoding/line-ending issues without a full NxM matrix.
        include:
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.14"
    # 3.15 is still a pre-release; let it run for early signal without blocking CI.
    continue-on-error: ${{ matrix.python-version == '3.15' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run Tests
        run: uv run pytest --cov=erdify tests/ --cov-report=xml --cov-report=term-missing

  # Single aggregate check to require in branch protection / rulesets. It turns
  # green only when every matrix leg above passes, so new Python versions or OSes
  # can be added to the matrix without editing the required-checks list. The
  # 3.15 pre-release leg is continue-on-error, so its failures do not block here.
  gate:
    name: Tests passed
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any matrix job failed
        if: needs.test.result != 'success'
        run: exit 1
